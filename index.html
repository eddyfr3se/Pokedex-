<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="icon" type="image/x-icon" href="./img/favicon.ico">
    <link rel="stylesheet" href="./style.css">
    <script defer src="./scripts/template.js"></script>
    <script defer src="./script.js"></script>
</head>

<body onload="init()">
    <div id="loading-screen" class="d-none">
        <img src="./img/ladebalken.png" alt="Loading...">
    </div>
    <div id="pokemon-overlay" class="d-none" onclick="closeDialog()">
        <div id="dialog-content" onclick="event.stopPropagation()">

        </div>
    </div>
    <header class="glass-header">
        <div class="header-wrapper">
            <img src="./img/logo1.png" id="header-logo" alt="Pokedex Logo">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search Pokémon...">
                <button onclick="searchPokemon()" id="search-btn">Search</button>
                <button onclick="resetSearch()" id="reset-btn" class="d-none">Reset</button>
            </div>
        </div>
    </header>
    <div id="search-error" class="d-none">
        Not Found!
    </div>
    <main class="main-content">
        <div id="pokedex"></div>
        <div class="load-more-container">
            <button id="load-more-btn" onclick="loadMorePokemon()">Load More</button>
        </div>
    </main>






    <footer class="glass-footer">
        <p>&copy; My Pokedex Projekt</p>
    </footer>

</body>

</html>
